name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/antaran-linux-${{ matrix.goarch }}" \
            ./cmd/antaran

      - name: Package
        run: |
          cd dist
          tar -czf "antaran-linux-${{ matrix.goarch }}.tar.gz" \
            "antaran-linux-${{ matrix.goarch }}"
          sha256sum "antaran-linux-${{ matrix.goarch }}.tar.gz" \
            > "antaran-linux-${{ matrix.goarch }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: antaran-linux-${{ matrix.goarch }}
          path: dist/antaran-linux-${{ matrix.goarch }}.*
          retention-days: 1

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
