name: Bug report
description: Something isn't working right
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill this out carefully — it helps a lot.

        For questions or general help, use [Discussions](https://github.com/xevrion/antaran/discussions) instead.

  - type: checkboxes
    attributes:
      label: Search before asking
      options:
        - label: I searched [existing issues](https://github.com/xevrion/antaran/issues?q=) and found nothing similar.
          required: true

  - type: textarea
    attributes:
      label: Antaran version
      description: Run `antaran --version` and paste the output.
    validations:
      required: true

  - type: textarea
    attributes:
      label: System
      description: Distro, kernel version, display server (Wayland/X11), compositor (Hyprland, GNOME, etc.)
      placeholder: "e.g. Ubuntu 24.04, kernel 6.8, Wayland, Hyprland 0.40"
    validations:
      required: true

  - type: textarea
    attributes:
      label: Go version
      description: Run `go version` and paste the output.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Exact steps, commands, or config that trigger the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    attributes:
      label: Actual behavior
      description: Include any error output or logs (`antaran --log-level debug`).
    validations:
      required: true

  - type: textarea
    attributes:
      label: Config file
      description: Paste your `~/.config/antaran/antaran.toml` (redact any paths you'd rather not share).
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Willing to submit a PR?
      options:
        - label: I'd like to fix this myself and submit a PR.
