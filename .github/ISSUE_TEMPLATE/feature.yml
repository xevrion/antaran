name: Feature request
description: Suggest something new for Antaran
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Great. Please check [Discussions](https://github.com/xevrion/antaran/discussions)
        first — it might already be in flight.

  - type: checkboxes
    attributes:
      label: Search before asking
      options:
        - label: I searched [existing issues](https://github.com/xevrion/antaran/issues?q=) and [discussions](https://github.com/xevrion/antaran/discussions) and didn't find this.
          required: true

  - type: textarea
    attributes:
      label: What problem does this solve?
      description: Describe the pain point, not the solution.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed solution
      description: What would you like Antaran to do?
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.
    validations:
      required: false

  - type: checkboxes
    attributes:
      label: Willing to submit a PR?
      options:
        - label: I'd like to implement this myself.
